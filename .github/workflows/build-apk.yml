# Expo EAS Build Configuration

name: EAS Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 14

      - name: Install dependencies
        run: |
          npm install -g eas-cli
          npm install

      - name: Build with EAS
        run: |
          eas build -p android --profile preview

- name: Get APK download URL
  id: apk_url
  run: |
    # Get the latest finished build for Android
    BUILD_URL=$(eas build:list --platform android --status finished --json | jq -r '.[0].artifacts.buildUrl')
    echo "APK_URL=$BUILD_URL" >> $GITHUB_ENV
    echo "APK download link: $BUILD_URL"
