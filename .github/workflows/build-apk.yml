name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:   # 👈 THIS enables "Run workflow" button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          npm install -g eas-cli
          npm install

      # 4. Install jq (for parsing build URL)
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 5. Login to Expo
      - name: Login to Expo
        run: eas login --token ${{ secrets.EXPO_TOKEN }}

      # 6. Build APK
      - name: Build APK with EAS
        run: eas build -p android --profile preview --non-interactive

      # 7. Get APK download link
      - name: Get APK download URL
        run: |
          BUILD_URL=$(eas build:list --platform android --status finished --json | jq -r '.[0].artifacts.buildUrl')
          echo "APK download link: $BUILD_URL"