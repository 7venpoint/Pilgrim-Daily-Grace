name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:   # 👈 allows manual build via "Run workflow" button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          npm install -g eas-cli
          npm install

      # 4️⃣ Install jq (needed to parse APK URL)
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 5️⃣ Build APK (using Expo token for authentication)
      - name: Build APK with EAS
        run: eas build -p android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 6️⃣ Get APK download link
      - name: Get APK download URL
        run: |
          BUILD_URL=$(eas build:list --platform android --status finished --json | jq -r '.[0].artifacts.buildUrl')
          echo "APK download link: $BUILD_URL"